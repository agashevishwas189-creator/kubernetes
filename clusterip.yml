apiVersion: v1
kind: pod
metadata :
 name : nginx-pod
 labels :
  app :nginx-pod
spec :
 contenior :
   - name  : my-container
     image : nginx:latest
     ports:
     -containerPort : 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  lables:
    app: nginx-service  
spec:
   type: ClusterIP
   selector:
    app: nginx-pod
    ports:
       protocol: TCP
       port: 80
       targetPort: 80
      

