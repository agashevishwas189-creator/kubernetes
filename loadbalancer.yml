apiVersion : v1
kind: Pod
metadata: 
  name: my-pod-lb
  labels:
    app:  my-pod-lb
spec:
  containers:
    - name: my-container
      image: nginx:latest
      ports: 
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
    name: my-LoadBalancer
    labels:
      app: my-pod-lb
spec:
    type: LoadBalancer
    selector:
      app: my-pod-lb
    ports:
      - protocol: TCP
        port: 80
        targetPort: 80
   


